<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注意事項</title>

<style>
body{
  margin:0;
  font-family:"Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#081120,#1a2540);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}

/* コンテナ */
.container{
  max-width:800px;
}

/* 必読 */
.alert{
  font-size:60px;
  font-weight:900;
  color:#ff4d4f;
  margin-bottom:30px;
  animation:pulse 1.2s infinite alternate;
}

@keyframes pulse{
  from{transform:scale(1)}
  to{transform:scale(1.08)}
}

/* 本文 */
.story{
  font-size:20px;
  line-height:2.2;
  margin-bottom:40px;
  color:#e5e7eb;
}

/* 赤文字 */
.red{
  color:#ff4d4f;
  font-weight:900;
}

/* 取引ボタン */
.trade-btn{
  display:inline-block;
  padding:24px 50px;
  font-size:30px;
  font-weight:900;
  border-radius:24px;
  text-decoration:none;
  color:white;

  background:linear-gradient(135deg,#2563eb,#60a5fa);
  
  box-shadow:
    0 0 20px rgba(96,165,250,0.6),
    0 15px 40px rgba(37,99,235,0.6);

  animation:btnPulse 1.2s infinite alternate;
  transition:0.2s;
}

.trade-btn:hover{
  transform:scale(1.1);
}

@keyframes btnPulse{
  from{transform:scale(1)}
  to{transform:scale(1.12)}
}

/* 戻る */
.back{
  display:inline-block;
  margin-top:25px;
  padding:14px 24px;
  border-radius:12px;
  background:#d90429;
  color:white;
  font-weight:900;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="alert">⚠ 必読 ⚠</div>

<div class="story">
多分あなたは取引時に困惑するでしょう。<br><br>

なぜなら <span class="red">選手名が書かれておらず特徴だけ書いてある</span> からです。<br><br>

これは我々の著作権という壮大な敵との戦いの証です。<br><br>

なので、取引時は株選択の時に <span class="red">何の株か予想しながら</span> 買ってください。<br><br>

<span class="red">プロ野球ガチ勢のあなたたちなら</span> わかるはず。<br><br>

今は何を言ってるかわからないと思いますが、取引画面に行けばわかります。<br><br>

チャンネルが大きくなればライセンス取得に一歩近づくのでよろしくお願いします。<br><br>

さぁみなさん、<span class="red">億万長者への道</span> を開きましょう！
</div>

<a class="trade-btn" href="https://script.google.com/macros/s/AKfycbz3E_YWFyfMcTczPWV8nrD3hvpFbQFZL_t6y60YTKJYSKL89IBk99mCstcQcaWm-Vrd/exec" target="_blank">
▶ 取引画面へ進む
</a>

<br>

<a class="back" href="index.html">トップへ戻る</a>

</div>

</body>
</html>
