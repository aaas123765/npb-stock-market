<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注意事項</title>

<style>
body{
  margin:0;
  font-family:"Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#081120,#1a2540);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}

/* 必読 */
.alert{
  font-size:60px;
  font-weight:900;
  color:#ff4d4f;
  margin-bottom:30px;
  animation:pulse 1.2s infinite alternate;
}

@keyframes pulse{
  from{transform:scale(1)}
  to{transform:scale(1.08)}
}

/* 本文 */
.story{
  max-width:800px;
  font-size:20px;
  line-height:2.2;
}

/* 行フェード */
.line{
  opacity:0;
  transform:translateY(20px);
  transition:0.8s ease;
}

.line.show{
  opacity:1;
  transform:translateY(0);
}

/* 赤文字 */
.red{
  color:#ff4d4f;
  font-weight:900;
}

/* ボタン */
.btn{
  display:inline-block;
  margin:10px;
  padding:16px 26px;
  border-radius:16px;
  font-weight:900;
  text-decoration:none;
  color:white;
}

.trade{
  background:#2563eb;
}

.back{
  background:#d90429;
}

.top-btn{
  margin-bottom:40px;
}
</style>
</head>

<body>

<div>

<!-- 取引ボタン（最初から表示） -->
<div class="top-btn">
<a class="btn trade" href="https://script.google.com/macros/s/AKfycbz3E_YWFyfMcTczPWV8nrD3hvpFbQFZL_t6y60YTKJYSKL89IBk99mCstcQcaWm-Vrd/exec" target="_blank">
取引画面へ進む
</a>
</div>

<div class="alert">⚠ 必読 ⚠</div>

<div id="story" class="story"></div>

<a class="btn back" href="index.html">トップへ戻る</a>

</div>

<script>

const lines = [
'多分あなたは取引時に困惑するでしょう。',
'なぜなら <span class="red">(選手名が書かれておらず特徴だけ書いてある)</span> からです。',
'',
'これは我々の著作権という壮大な敵との戦いの証です。',
'なので、取引時は株選択の時に <span class="red">(何の株か予想しながら)</span> 買ってください。',
'',
'<span class="red">(プロ野球ガチ勢のあなたたちなら)</span> わかるはず。',
'今は何を言ってるかわからないと思いますが、取引画面に行けばわかります。',
'',
'チャンネルが大きくなればライセンス取得に一歩近づくのでよろしくお願いします。',
'',
'さぁみなさん、<span class="red">(億万長者への道)</span> を開きましょう！'
];

const story = document.getElementById("story");

let i = 0;

function showLine(){
  if(i < lines.length){

    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = lines[i];

    story.appendChild(div);

    setTimeout(() => {
      div.classList.add("show");
    }, 50);

    i++;

    setTimeout(showLine, 800); // ←ここで速度調整（今は“ちょうどいい映画感”）
  }
}

window.onload = showLine;

</script>

</body>
</html>
