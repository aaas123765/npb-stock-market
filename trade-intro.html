<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注意事項</title>

<style>
body{
  margin:0;
  font-family:"Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#081120,#1a2540);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}

/* 必読 */
.alert{
  font-size:70px;
  font-weight:900;
  color:#ff4d4f;
  margin-bottom:30px;
  animation:pulse 1.2s infinite alternate;
}

@keyframes pulse{
  from{transform:scale(1)}
  to{transform:scale(1.08)}
}

/* 本文 */
.story{
  max-width:800px;
  font-size:22px;
  line-height:2.3;
  min-height:300px;
}

/* 文字アニメーション */
.char{
  opacity:0;
  transform:translateX(10px);
  display:inline-block;
  animation:fadeIn 0.4s forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* 赤文字 */
.red{
  color:#ff4d4f;
  font-weight:900;
}

/* ボタン */
.trade-btn{
  display:inline-block;
  padding:20px 40px;
  font-size:26px;
  font-weight:900;
  border-radius:20px;
  text-decoration:none;
  color:white;
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  box-shadow:0 10px 30px rgba(37,99,235,0.5);
  animation:btnPulse 1.5s infinite;
  margin-bottom:40px;
}

@keyframes btnPulse{
  from{transform:scale(1)}
  to{transform:scale(1.08)}
}

.back{
  display:inline-block;
  margin-top:20px;
  padding:14px 24px;
  border-radius:12px;
  background:#d90429;
  color:white;
  font-weight:900;
  text-decoration:none;
}
</style>
</head>

<body>

<div>

<a class="trade-btn" href="https://script.google.com/macros/s/AKfycbz3E_YWFyfMcTczPWV8nrD3hvpFbQFZL_t6y60YTKJYSKL89IBk99mCstcQcaWm-Vrd/exec" target="_blank">
▶ 取引画面へ進む
</a>

<div class="alert">⚠ 必読 ⚠</div>

<div id="story" class="story"></div>

<a class="back" href="index.html">トップへ戻る</a>

</div>

<script>

const text = `
多分あなたは取引時に困惑するでしょう。
なぜなら (選手名が書かれておらず特徴だけ書いてある) からです。

これは我々の著作権という壮大な敵との戦いの証です。
なので、取引時は株選択の時に (何の株か予想しながら) 買ってください。

(プロ野球ガチ勢のあなたたちなら) わかるはず。
今は何を言ってるかわからないと思いますが、取引画面に行けばわかります。

チャンネルが大きくなればライセンス取得に一歩近づくのでよろしくお願いします。

さぁみなさん、(億万長者への道) を開きましょう！
`;

const story = document.getElementById("story");

let i = 0;
const speed = 30;

function type(){

  if(i < text.length){

    let char = text[i];

    if(char === "\n"){
      story.innerHTML += "<br>";
    }else{
      const span = document.createElement("span");
      span.className = "char";

      // 赤文字処理
      if(char === "（" || char === "("){
        span.classList.add("red");
      }

      span.textContent = char;
      story.appendChild(span);
    }

    i++;
    setTimeout(type, speed);
  }
}

window.onload = type;

</script>

</body>
</html>
