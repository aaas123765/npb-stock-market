<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xリツイートキャンペーン | プロ野球株式市場</title>
  <style>
    body{margin:0;font-family:Arial,"Yu Gothic",sans-serif;background:linear-gradient(180deg,#f4f8ff,#ffffff);color:#172033;text-align:center}
    .wrap{max-width:860px;margin:0 auto;padding:20px}
    .top{display:inline-block;margin-top:10px;padding:10px 16px;border-radius:999px;background:#fff;border:1px solid #c7d2fe;font-weight:900}
    .hero{margin-top:18px;background:linear-gradient(135deg,#020617,#0f172a,#2563eb);color:#fff;padding:28px 18px;border-radius:26px;box-shadow:0 18px 40px rgba(15,23,42,.14)}
    h1{margin:0;font-size:clamp(30px,6vw,52px);line-height:1.1}
    .sub{margin-top:10px;font-size:clamp(16px,2.4vw,22px);font-weight:900}
    .card{margin-top:18px;background:#fff;border:1px solid #dbeafe;border-radius:22px;padding:22px;text-align:left;box-shadow:0 12px 28px rgba(15,23,42,.08)}
    .label{display:inline-block;padding:8px 12px;border-radius:999px;background:#e0e7ff;color:#1e3a8a;font-weight:900;font-size:12px}
    h2{margin:12px 0 10px;font-size:26px}
    p{margin:0 0 12px;line-height:1.9;color:#4b5563;font-weight:700}
    .point{display:grid;gap:10px;margin-top:14px}
    .item{background:#f8fbff;border-radius:16px;padding:14px 16px}
    .item strong{display:block;color:#111827;margin-bottom:4px}
    .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px}
    .btn{padding:14px 18px;border-radius:14px;color:#fff;font-weight:900}
    .dark{background:linear-gradient(135deg,#0f172a,#2563eb)}
    .blue{background:linear-gradient(135deg,#1d4ed8,#60a5fa)}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="top" href="index.html">← トップに戻る</a>

    <div class="hero">
      <h1>Xリツイートキャンペーン</h1>
      <div class="sub">対象ポストのリツイートで +25pt</div>
    </div>

    <div class="card">
      <span class="label">X CAMPAIGN</span>
      <h2>キャンペーン内容</h2>
      <p>対象ポストをリツイートすると +25pt プレゼント。参加は下のリンクからフォームを開いて、リツイートしたことが分かるスクリーンショットを貼って申請してください。</p>

      <div class="point">
        <div class="item">
          <strong>特典</strong>
          +25pt
        </div>
        <div class="item">
          <strong>参加方法</strong>
          1. 対象ポストをリツイートする<br>
          2. スクリーンショットを撮る<br>
          3. フォームから申請する
        </div>
        <div class="item">
          <strong>申請</strong>
          フォーム申請が必要です
        </div>
      </div>

      <div class="btns">
        <a class="btn dark" href="https://docs.google.com/forms/d/e/1FAIpQLSd-cjxGklrXFrcD4omiYB4g_ll9wGV6VRXVYWR0cH-FPBvdYw/viewform?usp=header" target="_blank" rel="noopener noreferrer">申請フォームを開く</a>
        <a class="btn blue" href="index.html">トップへ戻る</a>
      </div>
    </div>
  </div>
</body>
</html>
