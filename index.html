<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPB株式市場</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .box {
      background: #1e293b;
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      line-height: 1.8;
    }

    .btn-area {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: #2563eb;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .sub-btn {
      background: #475569;
    }

    .sub-btn:hover {
      background: #334155;
    }

    .note {
      margin-top: 30px;
      font-size: 14px;
      color: #94a3b8;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 30px;
      }

      .btn {
        display: block;
        width: 80%;
        margin: 10px auto;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>NPB株式市場</h1>
    <p class="sub">プロ野球選手を“株”のように売買して競う参加型企画</p>

    <div class="box">
      <h2>この企画について</h2>
      <p>
        選手の活躍によって株価が変動。<br>
        ポイントを使って売買し、資産を増やすゲームです。
      </p>
    </div>

    <div class="box">
      <h2>参加方法</h2>
      <p>
        ① 登録ページから参加<br>
        ② 初期ポイントを受け取る<br>
        ③ 取引ページで売買開始！
      </p>
    </div>

    <p style="margin-top:30px; font-size:18px;">
      ▼ 今すぐ参加してランキング上位を狙え！
    </p>

    <div class="btn-area">
      <a href="https://script.google.com/macros/s/AKfycbz3E_YWFyfMcTczPWV8nrD3hvpFbQFZL_t6y60YTKJYSKL89IBk99mCstcQcaWm-Vrd/exec?page=register" class="btn" target="_blank">
        今すぐ参加
      </a>

      <a href="https://script.google.com/macros/s/AKfycbz3E_YWFyfMcTczPWV8nrD3hvpFbQFZL_t6y60YTKJYSKL89IBk99mCstcQcaWm-Vrd/exec" class="btn sub-btn" target="_blank">
        売買する
      </a>

      <a href="https://docs.google.com/spreadsheets/d/1gkVLyGNofqRc0cw5azGiMiI1q7G6qrgHci4zi7vkyAs/edit?gid=0#gid=0" class="btn sub-btn" target="_blank">
        ランキングを見る
      </a>
    </div>

    <p class="note">
      ※ 外部ページに移動します
    </p>

  </div>
</body>
</html>
