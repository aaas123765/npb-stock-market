<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ひな祭りキャンペーン | プロ野球株式市場</title>
  <style>
    body{margin:0;font-family:Arial,"Yu Gothic",sans-serif;background:linear-gradient(180deg,#fff7fb,#ffffff);color:#172033;text-align:center}
    .wrap{max-width:860px;margin:0 auto;padding:20px}
    .top{display:inline-block;margin-top:10px;padding:10px 16px;border-radius:999px;background:#fff;border:1px solid #f9a8d4;font-weight:900}
    .hero{margin-top:18px;background:linear-gradient(135deg,#d61f69,#f472b6,#ffd6e7);color:#5f1738;padding:28px 18px;border-radius:26px;box-shadow:0 18px 40px rgba(15,23,42,.14)}
    h1{margin:0;font-size:clamp(30px,6vw,52px);line-height:1.1}
    .sub{margin-top:10px;font-size:clamp(16px,2.4vw,22px);font-weight:900}
    .card{margin-top:18px;background:#fff;border:1px solid #fbcfe8;border-radius:22px;padding:22px;text-align:left;box-shadow:0 12px 28px rgba(15,23,42,.08)}
    .label{display:inline-block;padding:8px 12px;border-radius:999px;background:#fce7f3;color:#9d174d;font-weight:900;font-size:12px}
    h2{margin:12px 0 10px;font-size:26px}
    p{margin:0 0 12px;line-height:1.9;color:#4b5563;font-weight:700}
    .point{display:grid;gap:10px;margin-top:14px}
    .item{background:#fff7fb;border-radius:16px;padding:14px 16px}
    .item strong{display:block;color:#111827;margin-bottom:4px}
    .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px}
    .btn{padding:14px 18px;border-radius:14px;color:#fff;font-weight:900}
    .blue{background:linear-gradient(135deg,#1d4ed8,#60a5fa)}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="top" href="index.html">← トップに戻る</a>

    <div class="hero">
      <h1>ひな祭りキャンペーン</h1>
      <div class="sub">3/28〜4/20限定・取引時に持ち株が 1.05倍</div>
    </div>

    <div class="card">
      <span class="label">SEASONAL CAMPAIGN</span>
      <h2>キャンペーン内容</h2>
      <p>3/28から4/20限定で、取引時に持ち株が 1.05倍 になるキャンペーンです。期間中はいつもより有利に取引できます。</p>

      <div class="point">
        <div class="item">
          <strong>開催期間</strong>
          3/28 〜 4/20
        </div>
        <div class="item">
          <strong>特典</strong>
          取引時に持ち株が 1.05倍
        </div>
        <div class="item">
          <strong>参加方法</strong>
          期間中に通常どおり取引するだけで対象です
        </div>
      </div>

      <div class="btns">
        <a class="btn blue" href="https://script.google.com/macros/s/AKfycbz3E_YWFyfMcTczPWV8nrD3hvpFbQFZL_t6y60YTKJYSKL89IBk99mCstcQcaWm-Vrd/exec" target="_blank" rel="noopener noreferrer">取引ページを開く</a>
        <a class="btn blue" href="index.html">トップへ戻る</a>
      </div>
    </div>
  </div>
</body>
</html>
